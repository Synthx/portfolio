name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions: {}

jobs:
    build:
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run build
            - uses: actions/upload-artifact@v7
              if: github.ref == 'refs/heads/main'
              with:
                  name: main
                  path: dist/
                  retention-days: 2
